version: '3.8'

services:
  app:
    build: .
    container_name: retrieval-gpt-app
    ports:
      - "8501:8501"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Users can override keys via container env
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./cache:/app/cache
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: retrieval-gpt-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  redis-data:
